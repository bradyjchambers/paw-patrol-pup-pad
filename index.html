<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pup Pad</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@700;800;900&family=Literata:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* CSS Reset & Hardware Optimization */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #121212; 
            background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.7)), url('images/paw-patrolbg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white; 
            overflow: hidden; 
            font-family: 'Literata', Tahoma, sans-serif; 
            width: 100vw; height: 100vh;
        }

        h1, h2, h3 { 
            font-family: 'Barlow', Tahoma, sans-serif; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Screen Management */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
        }

        /* --- Dimensional Pup Tags --- */
        .pup-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            width: 95%;
            max-width: 900px;
        }

        .pup-badge {
            position: relative;
            background-color: var(--pup-bg, #333);
            background-image: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0.2) 100%);
            border-radius: 30px 30px 60px 60px; 
            padding: 40px 10px;
            text-align: center;
            font-family: 'Barlow', Tahoma, sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: white;
            cursor: pointer;
            
            border: 8px solid #e8e8e8;
            border-top-color: #ffffff;
            border-bottom-color: #b0b0b0;
            box-shadow: 
                0 15px 20px rgba(0,0,0,0.5),
                inset 0 10px 10px rgba(255,255,255,0.5),
                inset 0 -10px 15px rgba(0,0,0,0.4);
            
            transition: transform 0.1s cubic-bezier(0.4, 0.0, 0.2, 1), box-shadow 0.1s ease, filter 0.2s ease, border-color 0.1s ease;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 180px;
        }

        .pup-badge img {
            max-width: 90%;
            max-height: 120px;
            object-fit: contain;
            pointer-events: none;
            z-index: 2;
        }

        .pup-badge::after {
            content: '';
            position: absolute;
            top: 2%;
            left: 5%;
            width: 90%;
            height: 40%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent);
            border-radius: 50px 50px 100px 100px;
            pointer-events: none;
        }

        /* Character Colors */
        #badge-chase { --pup-bg: #0033A0; }
        #badge-marshall { --pup-bg: #DA291C; }
        #badge-skye { --pup-bg: #E8499B; }
        #badge-rubble { --pup-bg: #FFC72C; color: #111; text-shadow: none; }
        #badge-rocky { --pup-bg: #00A368; }
        #badge-zuma { --pup-bg: #FF671F; }

        .pup-badge:active { 
            transform: translateY(8px) scale(0.95); 
            box-shadow: 
                0 4px 5px rgba(0,0,0,0.6),
                inset 0 10px 10px rgba(255,255,255,0.2),
                inset 0 -10px 15px rgba(0,0,0,0.5);
            border-top-color: #c0c0c0;
            border-bottom-color: #ffffff;
        }

        /* --- Active Pup Overlay (Drum Pad State) --- */
        #pup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(8px);
        }

        #pup-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        #overlay-image {
            max-width: 80%;
            max-height: 70vh;
            object-fit: contain;
            transform: scale(0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.8));
        }

        #pup-overlay.active #overlay-image {
            transform: scale(1);
        }
        
        /* Dynamic pulse generated in JS based on pup theme color */
        @keyframes pulse-glow {
            0% { filter: drop-shadow(0 0 20px var(--active-glow-color, rgba(255, 255, 255, 0.6))); }
            100% { filter: drop-shadow(0 0 80px var(--active-glow-color, rgba(255, 255, 255, 1))); }
        }

        /* Dispatch Overlay */
        #dispatch-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex; align-items: center; justify-content: center;
            z-index: 1500; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease; backdrop-filter: blur(8px);
            gap: 20px; flex-wrap: wrap; padding: 20px;
        }

        #dispatch-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .dispatch-pup-img {
            max-width: 30%;
            max-height: 40vh;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5));
            animation: pulse-glow 1.5s infinite alternate;
        }

        /* Video Container */
        video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* Selection Mode */
        body.selection-mode { background-color: #111; }
        body.selection-mode .pup-badge { opacity: 0.4; transition: all 0.3s ease; }
        body.selection-mode .pup-badge.selected { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 15px var(--pup-bg)); border-color: #fff; }
        
        #btn-call-pups {
            display: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 15px 50px; font-size: 2rem; font-weight: 900; border-radius: 40px; cursor: pointer;
            background: #00958d; color: white; border: 5px solid #fff; font-family: 'Barlow', sans-serif;
            text-transform: uppercase; z-index: 1000; box-shadow: 0 0 20px rgba(0, 149, 141, 0.8);
            animation: pulse-glow 1.5s infinite alternate;
        }
        
        #mission-text {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%;
            text-align: center; font-size: 2.2rem; color: #fff; font-family: 'Barlow', sans-serif;
            font-weight: 900; text-shadow: 0 4px 8px rgba(0,0,0,0.8), 0 0 20px rgba(0,0,0,1);
            z-index: 2000; display: none; line-height: 1.2;
        }

        /* Tablet Landscape Optimization (Blackview Tab 3 Kids ~ 1024x600) */
        @media (max-height: 650px) {
            .pup-badge { min-height: 110px; padding: 20px 10px; border-width: 6px; }
            .pup-badge img { max-height: 80px; }
            #main-title { font-size: 2.2rem !important; margin-bottom: 15px !important; }
            .pup-grid { gap: 15px; padding: 10px; }
            #badge-theme-container { margin-top: 10px !important; }
            #logo-button { height: 75px !important; }
            #screen-video button { padding: 10px 30px !important; font-size: 1.2rem !important; }
            #btn-call-pups { bottom: 10px; padding: 10px 40px; font-size: 1.5rem; }
            #mission-text { font-size: 1.6rem; bottom: 10px; }
        }
    </style>
</head>
<body>

    <div id="screen-main" class="screen">
        <h1 id="main-title" style="margin-bottom: 30px; font-size: 3.5rem; color: #fff;">RYDER'S PUP PAD</h1>
        <div class="pup-grid" id="pup-container">
            <!-- Badges generated by JS -->
        </div>
        <button id="btn-call-pups">Call Pups!</button>
        <div id="badge-theme-container" style="text-align: center; margin-top: 30px;">
            <img src="images/theme.png" alt="PAW Patrol Logo" id="logo-button" style="height: 100px; cursor: pointer; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); transition: transform 0.1s;" onmousedown="this.style.transform='scale(0.95)'" onmouseup="this.style.transform='scale(1)'">
        </div>
    </div>

    <div id="pup-overlay">
        <img id="overlay-image" src="" alt="Active Pup">
        <div id="mission-text"></div>
    </div>

    <div id="dispatch-overlay"></div>

    <div id="screen-video" class="screen" style="background-color: black; z-index: 2000; display: none;">
        <video id="master-video" playsinline></video>
        <div style="position: absolute; bottom: 40px; display: flex; gap: 20px; z-index: 2001;">
            <button id="btn-pause-video" style="padding: 15px 40px; font-size: 1.5rem; font-weight: 900; border-radius: 30px; cursor: pointer; background: #FFC72C; color: #111; border: 4px solid #fff; font-family: 'Barlow', sans-serif; text-transform: uppercase;">Pause</button>
            <button id="btn-stop-video" style="padding: 15px 40px; font-size: 1.5rem; font-weight: 900; border-radius: 30px; cursor: pointer; background: #DA291C; color: white; border: 4px solid #fff; font-family: 'Barlow', sans-serif; text-transform: uppercase;">Stop</button>
        </div>
    </div>

    <script>
        class PupPadController {
            constructor() {
                this.audioPlayer = new Audio();
                this.audioCtx = null; // Lazy load Web Audio Context to comply with browser policies
                
                this.appState = 'idle';
                this.selectedPups = new Set();
                this.pollInterval = null;
                
                this.badImages = ['Mayor Humdinger 1.png', 'Mayor Humdinger 2.png', 'Mayor Humdinger 3.png', 'Mayor Humdinger 4.png'];
                this.goodImages = ['Mayor Goodway 1.png', 'Mayor Goodway 2.png', 'Mayor Goodway 3.png', 'Captain Turbot 1.png', 'Captain Turbot 2.png', 'Captain Turbot 3.png', 'Mr Porter 1.png', 'Mr Porter 2.png', 'Mr Porter 3.png'];

                this.scenarios = {
                    'Mayor Humdinger': [
                        "Mayor Humdinger stole all the cheese in Adventure Bay!",
                        "Mayor Humdinger wants to trap the pups and force them to make pizza!",
                        "Mayor Humdinger replaced all the dog treats with broccoli!",
                        "Oh no! Mayor Humdinger painted the Lookout Tower bright purple!",
                        "Mayor Humdinger has a giant robot vacuum chasing the kittens!",
                        "Mayor Humdinger is trying to bounce all the way to the moon on a giant pogo stick!",
                        "Help! Mayor Humdinger hid all the pup-packs in a giant jelly bean jar!",
                        "Mayor Humdinger is turning all the water in Adventure Bay into slimy green goo!",
                        "Mayor Humdinger accidentally glued his mustache to a runaway skateboard!",
                        "Mayor Humdinger is trying to steal the sun using a giant mirror!",
                        "Mayor Humdinger challenged the pups to a dance-off, but he's cheating with rocket boots!",
                        "Mayor Humdinger let all the monkeys out of the zoo to build him a sandcastle!",
                        "Mayor Humdinger built a giant fan that's blowing away everyone's ice cream!",
                        "Mayor Humdinger is trying to shrink the Lookout with a laser beam!",
                        "Mayor Humdinger trapped himself in a giant bubble and is floating away!"
                    ],
                    'Mayor Goodway': [
                        "Mayor Goodway lost Chickaletta in a giant pile of marshmallows!",
                        "Mayor Goodway needs help! The giant golden Chickaletta statue is rolling away!",
                        "Oh my! Mayor Goodway's prize-winning tulips are being eaten by runaway bunnies!",
                        "Mayor Goodway's hot air balloon is stuck in a giant cotton candy cloud!",
                        "Help! Mayor Goodway dropped the key to the city into the duck pond!",
                        "Mayor Goodway needs the pups to bake a giant cake for the town festival!",
                        "Chickaletta got stuck on top of the Ferris wheel and won't come down!",
                        "Mayor Goodway's purse was snatched by a very cheeky seagull!",
                        "Mayor Goodway accidentally dyed all the town's fountains bright pink!",
                        "Mayor Goodway needs an emergency rescue for a stranded baby elephant!",
                        "Mayor Goodway's town parade is being blocked by a family of sleepy bears!",
                        "Mayor Goodway lost her glasses and thinks a fire hydrant is a dog!",
                        "Mayor Goodway needs the pups to help catch a runaway train full of popcorn!",
                        "Mayor Goodway is stuck in a giant pile of autumn leaves!",
                        "Mayor Goodway accidentally glued Chickaletta's favorite corn cob to the ceiling!"
                    ],
                    'Captain Turbot': [
                        "Captain Turbot's boat the Flounder is stuck on a giant sleeping whale!",
                        "Captain Turbot dropped his favorite binoculars into a school of ticklish jellyfish!",
                        "Captain Turbot accidentally painted himself orange and the squids are chasing him!",
                        "Captain Turbot's submarine is tangled in a giant knot of seaweed!",
                        "Captain Turbot found a pirate treasure chest, but it's guarded by a grumpy crab!",
                        "Help! Captain Turbot's glasses were stolen by a sneaky seagull!",
                        "Captain Turbot discovered a new species of singing fish, but they're too loud!",
                        "Captain Turbot's lighthouse lamp is broken and a foggy storm is rolling in!",
                        "Captain Turbot accidentally dropped a whole box of fish treats into the ocean!",
                        "Captain Turbot is trapped on an island surrounded by playful, splashing dolphins!",
                        "Captain Turbot needs help rescuing a baby walrus stuck on an iceberg!",
                        "Captain Turbot's fishing net caught a giant, heavy, and very confused octopus!",
                        "Captain Turbot's boat ran out of gas and is drifting towards a waterfall!",
                        "Captain Turbot found a sunken ship, but he's too scared of the ghosts!",
                        "Captain Turbot accidentally mixed up his fish food with his own breakfast cereal!"
                    ],
                    'Mr Porter': [
                        "Mr. Porter's pies all got eaten by sneaky squirrels!",
                        "Mr. Porter accidentally baked a cake so big it burst through the bakery roof!",
                        "Mr. Porter's delivery van got a flat tire in the middle of a muddy puddle!",
                        "Mr. Porter spilled slippery syrup all over the street and cars are sliding everywhere!",
                        "Mr. Porter's giant watermelon rolled away and is bouncing down Main Street!",
                        "Help! Mr. Porter's oven is stuck on high and shooting out burnt toast!",
                        "Mr. Porter accidentally created a giant dough monster that's hugging everyone!",
                        "Mr. Porter needs help rescuing a kitten stuck on top of a flour sack!",
                        "Mr. Porter dropped his secret recipe book into a giant vat of soup!",
                        "Mr. Porter's grocery store is being overrun by hungry, runaway piglets!",
                        "Mr. Porter needs the pups to catch a thief stealing all the dog treats!",
                        "Mr. Porter accidentally locked himself inside the giant walk-in freezer!",
                        "Mr. Porter's fruit stand was blown over by a giant gust of wind!",
                        "Mr. Porter needs help delivering a hundred pizzas before they get cold!",
                        "Mr. Porter's new spaghetti recipe is so sticky, people's shoes are stuck to the floor!"
                    ]
                };

                this.pups = [
                    { id: 'chase', name: 'CHASE' },
                    { id: 'marshall', name: 'MARSHALL' },
                    { id: 'skye', name: 'SKYE' },
                    { id: 'rubble', name: 'RUBBLE' },
                    { id: 'rocky', name: 'ROCKY' },
                    { id: 'zuma', name: 'ZUMA' }
                ];
                
                this.comboSequence = ['chase', 'marshall', 'skye'];
                this.currentComboIndex = 0;
                
                this.ui = {
                    pupContainer: document.getElementById('pup-container'),
                    overlay: document.getElementById('pup-overlay'),
                    overlayImage: document.getElementById('overlay-image'),
                    missionText: document.getElementById('mission-text'),
                    logoButton: document.getElementById('logo-button'),
                    videoScreen: document.getElementById('screen-video'),
                    videoPlayer: document.getElementById('master-video'),
                    btnPause: document.getElementById('btn-pause-video'),
                    btnStop: document.getElementById('btn-stop-video'),
                    btnCallPups: document.getElementById('btn-call-pups')
                };

                this.overlayTimeout = null;
                this.init();
            }

            init() {
                this.renderPupGrid();
                this.startPolling();
                this.ui.btnCallPups.addEventListener('click', () => this.dispatchMission());
                
                // Hide overlay if clicked before audio finishes
                this.ui.overlay.addEventListener('click', () => {
                    if (this.appState === 'incoming_call' || this.appState === 'dispatch') return;
                    this.playSynthesizedClick();
                    this.hideOverlay();
                });
                
                // Hide overlay naturally when audio ends
                this.audioPlayer.addEventListener('ended', () => this.hideOverlay());

                // Video controls and Easter Egg (Long Press)
                let logoPressTimer;
                const startLogoPress = (e) => {
                    if (e.cancelable) e.preventDefault();
                    this.playSynthesizedClick();
                    logoPressTimer = setTimeout(() => {
                        logoPressTimer = null;
                        this.playRyderEasterEgg();
                    }, 2000); // 2 second hold
                };
                
                const cancelLogoPress = () => {
                    if (logoPressTimer) {
                        clearTimeout(logoPressTimer);
                        this.playThemeSong(); // It was a short tap
                    }
                };

                this.ui.logoButton.addEventListener('mousedown', startLogoPress);
                this.ui.logoButton.addEventListener('mouseup', cancelLogoPress);
                this.ui.logoButton.addEventListener('mouseleave', () => { if (logoPressTimer) clearTimeout(logoPressTimer); });
                this.ui.logoButton.addEventListener('touchstart', startLogoPress, {passive: false});
                this.ui.logoButton.addEventListener('touchend', cancelLogoPress);

                this.ui.videoPlayer.addEventListener('ended', () => this.stopVideo());
                this.ui.btnPause.addEventListener('click', () => { this.playSynthesizedClick(); this.togglePauseVideo(); });
                this.ui.btnStop.addEventListener('click', () => { this.playSynthesizedClick(); this.stopVideo(); });
            }

            renderPupGrid() {
                this.pups.forEach(pup => {
                    const badge = document.createElement('div');
                    badge.className = 'pup-badge';
                    badge.id = `badge-${pup.id}`;
                    badge.innerHTML = `
                        <img src="images/${pup.id}.png?v=2" alt="${pup.name}" onerror="this.style.display='none';">
                    `;
                    
                    let pressTimer = null;
                    let isLongPress = false;

                    const startPress = () => {
                        isLongPress = false;
                        if (pup.id === 'zuma' || pup.id === 'chase') {
                            pressTimer = setTimeout(() => {
                                isLongPress = true;
                                this.playSynthesizedClick();
                                this.triggerIncomingCall(pup.id === 'zuma' ? 'bad' : 'good');
                            }, 4000); // 4 second hold
                        }
                    };

                    const cancelPress = () => {
                        if (pressTimer) clearTimeout(pressTimer);
                    };

                    badge.addEventListener('mousedown', startPress);
                    badge.addEventListener('touchstart', startPress, {passive: true});
                    badge.addEventListener('mouseup', cancelPress);
                    badge.addEventListener('mouseleave', cancelPress);
                    badge.addEventListener('touchend', cancelPress);

                    badge.addEventListener('click', () => {
                        if (isLongPress) return; // Ignore standard click if long press triggered
                        this.playPup(pup);
                    });

                    this.ui.pupContainer.appendChild(badge);
                });
            }

            playPup(pup) {
                this.playSynthesizedClick();

                if (this.appState === 'incoming_call' || this.appState === 'dispatch') {
                    return; // Ignore standard badge clicks during these mission states
                }

                if (this.appState === 'selection') {
                    const badge = document.getElementById(`badge-${pup.id}`);
                    if (this.selectedPups.has(pup.id)) {
                        this.selectedPups.delete(pup.id);
                        badge.classList.remove('selected');
                    } else {
                        if (this.selectedPups.size < 6) {
                            this.selectedPups.add(pup.id);
                            badge.classList.add('selected');
                        }
                    }
                    return;
                }

                // Secret Combo Tracker
                if (pup.id === this.comboSequence[this.currentComboIndex]) {
                    this.currentComboIndex++;
                    if (this.currentComboIndex === this.comboSequence.length) {
                        this.currentComboIndex = 0; // reset
                        return this.playEverestEasterEgg();
                    }
                } else {
                    this.currentComboIndex = (pup.id === this.comboSequence[0]) ? 1 : 0;
                }

                // Audio feedback (.wav is the new standard)
                this.audioPlayer.pause();
                this.audioPlayer.onended = () => this.hideOverlay(); // Restore normal end behavior
                this.audioPlayer.src = `audio/${pup.id}-audio.wav`;
                this.audioPlayer.currentTime = 0;
                this.audioPlayer.play().catch(e => console.log("Audio play prevented/missing file", e));

                // Show the active character pop-out
                this.ui.overlayImage.src = `images/characters/${pup.id}.png`;
                
                // Set glow color based on character theme
                const badgeElement = document.getElementById(`badge-${pup.id}`);
                const themeColor = getComputedStyle(badgeElement).getPropertyValue('--pup-bg').trim();
                
                if (themeColor) {
                    this.ui.overlayImage.style.setProperty('--active-glow-color', themeColor);
                    this.ui.overlayImage.style.animation = 'none';
                    // Trigger reflow to restart animation
                    void this.ui.overlayImage.offsetWidth; 
                    this.ui.overlayImage.style.animation = 'pulse-glow 1.5s infinite alternate';
                }

                this.ui.overlay.classList.add('active');

                // Failsafe timeout in case audio fails or is missing (fallback to 4s)
                if (this.overlayTimeout) clearTimeout(this.overlayTimeout);
                this.overlayTimeout = setTimeout(() => {
                    if (this.audioPlayer.paused) {
                        this.hideOverlay();
                    }
                }, 4000);
            }
            
            hideOverlay() {
                this.ui.overlay.classList.remove('active');
                this.ui.missionText.style.display = 'none';
                if (this.overlayTimeout) clearTimeout(this.overlayTimeout);
                document.body.style.boxShadow = 'none';
            }

            startPolling() {
                this.pollInterval = setInterval(async () => {
                    if (this.appState !== 'idle') return;
                    try {
                        const response = await fetch(`state.json?t=${Date.now()}`);
                        if (!response.ok) return;
                        const data = await response.json();
                        
                        if (data.state === 'bad' || data.state === 'good') {
                            this.triggerIncomingCall(data.state);
                            // Auto-reset server state to idle via our custom python server
                            fetch('/', { method: 'POST', body: 'param=idle' }).catch(() => {});
                        }
                    } catch (e) { /* ignore */ }
                }, 2000);
            }

            triggerIncomingCall(stateType) {
                this.appState = 'incoming_call';
                this.audioPlayer.pause();
                this.audioPlayer.onended = null;

                const images = stateType === 'bad' ? this.badImages : this.goodImages;
                const glow = stateType === 'bad' ? '#800080' : '#FFD700';
                const charImage = images[Math.floor(Math.random() * images.length)];
                
                this.ui.overlayImage.src = `images/characters/${charImage}`;
                
                this.ui.overlayImage.style.setProperty('--active-glow-color', glow);
                this.ui.overlayImage.style.animation = 'none';
                void this.ui.overlayImage.offsetWidth; 
                this.ui.overlayImage.style.animation = 'pulse-glow 0.8s infinite alternate';
                
                let characterName = '';
                if (charImage.includes('Mayor Humdinger')) characterName = 'Mayor Humdinger';
                else if (charImage.includes('Mayor Goodway')) characterName = 'Mayor Goodway';
                else if (charImage.includes('Captain Turbot')) characterName = 'Captain Turbot';
                else if (charImage.includes('Mr Porter')) characterName = 'Mr Porter';

                const possibleScenarios = this.scenarios[characterName] || ["Emergency in Adventure Bay!"];
                const selectedScenario = possibleScenarios[Math.floor(Math.random() * possibleScenarios.length)];
                
                this.ui.missionText.innerText = selectedScenario;
                this.ui.missionText.style.display = 'block';

                this.ui.overlay.classList.add('active');

                // Auto transition to Selection state after 5 seconds for reading the text
                setTimeout(() => {
                    this.hideOverlay();
                    this.enterSelectionState();
                }, 5000);
            }

            enterSelectionState() {
                this.appState = 'selection';
                this.selectedPups.clear();
                document.body.classList.add('selection-mode');
                document.querySelectorAll('.pup-badge').forEach(el => el.classList.remove('selected'));
                this.ui.btnCallPups.style.display = 'block';
            }

            dispatchMission() {
                if (this.selectedPups.size === 0) return;
                this.appState = 'dispatch';
                this.playSynthesizedClick();
                this.ui.btnCallPups.style.display = 'none';
                document.body.classList.remove('selection-mode');
                
                // Show dispatch overlay with selected pups array
                const dispatchOverlay = document.getElementById('dispatch-overlay');
                dispatchOverlay.innerHTML = ''; // clear previous
                
                this.selectedPups.forEach(pupId => {
                    const img = document.createElement('img');
                    img.src = `images/animations/${pupId}.gif`;
                    img.className = 'dispatch-pup-img';
                    
                    const badgeElement = document.getElementById(`badge-${pupId}`);
                    if (badgeElement) {
                        const themeColor = getComputedStyle(badgeElement).getPropertyValue('--pup-bg').trim();
                        if (themeColor) {
                            img.style.setProperty('--active-glow-color', themeColor);
                        }
                    }
                    
                    dispatchOverlay.appendChild(img);
                });
                
                dispatchOverlay.classList.add('active');
                
                this.audioPlayer.pause();
                this.audioPlayer.src = 'audio/incoming_call.wav';
                this.audioPlayer.currentTime = 0;
                this.audioPlayer.play().catch(e => console.log(e));

                this.audioPlayer.onended = () => {
                    dispatchOverlay.classList.remove('active');
                    this.resetToIdle();
                };
            }

            resetToIdle() {
                this.appState = 'idle';
                this.selectedPups.clear();
                document.querySelectorAll('.pup-badge').forEach(el => el.classList.remove('selected'));
                this.ui.btnCallPups.style.display = 'none';
                document.body.classList.remove('selection-mode');
            }

            playSynthesizedClick() {
                try {
                    if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
                    
                    const osc = this.audioCtx.createOscillator();
                    const gain = this.audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, this.audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1200, this.audioCtx.currentTime + 0.05);
                    
                    gain.gain.setValueAtTime(0.3, this.audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.05);
                    
                    osc.connect(gain);
                    gain.connect(this.audioCtx.destination);
                    
                    osc.start();
                    osc.stop(this.audioCtx.currentTime + 0.05);
                } catch (e) { console.warn("Web Audio API error", e); }
            }

            playRyderEasterEgg() {
                this.audioPlayer.pause();
                this.audioPlayer.src = 'audio/ryder.mp3';
                this.audioPlayer.currentTime = 0;
                this.audioPlayer.play().catch(e => console.log(e));
                
                // Visual feedback: Screen pulses red
                document.body.style.transition = 'box-shadow 0.2s ease';
                document.body.style.boxShadow = 'inset 0 0 50px 20px rgba(218, 41, 28, 0.8)';
                setTimeout(() => document.body.style.boxShadow = 'none', 800);
            }

            playEverestEasterEgg() {
                this.audioPlayer.pause();
                this.audioPlayer.onended = () => this.hideOverlay(); // restore default
                this.audioPlayer.src = 'audio/everest.mp3';
                this.audioPlayer.currentTime = 0;
                this.audioPlayer.play().catch(e => console.log(e));
                
                // Show the active character pop-out using the badge as we don't have a full char image
                this.ui.overlayImage.src = 'image assets/EverestBadge.png';
                
                this.ui.overlayImage.style.setProperty('--active-glow-color', '#00958d');
                this.ui.overlayImage.style.animation = 'none';
                void this.ui.overlayImage.offsetWidth; 
                this.ui.overlayImage.style.animation = 'pulse-glow 1.5s infinite alternate';
                
                this.ui.overlay.classList.add('active');
                
                if (this.overlayTimeout) clearTimeout(this.overlayTimeout);
                this.overlayTimeout = setTimeout(() => {
                    if (this.audioPlayer.paused) this.hideOverlay();
                }, 4000);
            }

            playThemeSong() {
                this.audioPlayer.pause();
                this.ui.videoScreen.style.display = 'flex';
                this.ui.videoPlayer.src = 'videos/theme_song.mp4';
                this.ui.videoPlayer.load();
                this.ui.videoPlayer.play().catch(e => console.log("Video playback error", e));
                this.ui.btnPause.innerText = 'Pause';
            }

            togglePauseVideo() {
                if (this.ui.videoPlayer.paused) {
                    this.ui.videoPlayer.play();
                    this.ui.btnPause.innerText = 'Pause';
                } else {
                    this.ui.videoPlayer.pause();
                    this.ui.btnPause.innerText = 'Play';
                }
            }

            stopVideo() {
                this.ui.videoPlayer.pause();
                this.ui.videoPlayer.currentTime = 0;
                this.ui.videoScreen.style.display = 'none';
            }
        }

        const App = new PupPadController();
    </script>
</body>
</html>
